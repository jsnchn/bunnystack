services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bunnystack
      POSTGRES_PASSWORD: bunnystack
      POSTGRES_DB: bunnystack
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bunnystack -d bunnystack"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
